# Quiz Question Service Configuration - Development Environment
# This file will be served by Config Server at:
# http://localhost:8888/quiz-question-service/dev

server:
  port: 8084
  servlet:
    context-path: /api

spring:
  application:
    name: quiz-question-service
  
  # Database Configuration (MySQL)
  datasource:
    url: jdbc:mysql://127.0.0.1:3307/codetikki?useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Service Configuration
services:
  authentication:
    url: http://localhost:8085/api

# Logging Configuration
logging:
  level:
    root: INFO
    org.springframework.web: DEBUG
    com.codetikki.quizquestion: DEBUG
    org.hibernate.SQL: DEBUG
  
  file:
    name: logs/quiz-question-service.log
    max-size: 10MB
    max-history: 10

# Actuator Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
